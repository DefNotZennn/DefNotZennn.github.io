<!DOCTYPE html>
<html lang="en">
  <head>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zen's Portfolio</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-glow" aria-hidden="true"></div>

    <header class="site-header glass">
      <nav class="tab-nav" aria-label="Main navigation">
        <button class="tab-link active" data-tab="home"><strong>Home</strong></button>
        <button class="tab-link" data-tab="experience"><strong>Past Experiences</strong></button>
        <button class="tab-link" data-tab="contact"><strong>Contact</strong></button>
      </nav>
    </header>

    <main class="page-shell">
      <section id="home" class="tab-panel active">
        <article class="hero glass">
          <div class="profile-strip">
            <div class="avatar-wrap">
              <img id="discord-avatar" src="" alt="Avatar" />
              <span id="status-dot" class="status-dot status-offline"></span>
            </div>
            <div class="identity-meta">
              <h1 class="identity-name">Zen</h1>
              <p class="identity-alias">Z3NIRI (Formerly DefNot_Zennn)</p>
              <div class="identity-sub">
                <p class="identity-role">Roblox Developer</p>
                <p id="discord-presence" class="presence-label">Offline</p>
              </div>
            </div>
          </div>
          <div class="about-content">
            <h3 class="section-title">👋 Introduction</h3>
            <p class="about-text" id="intro-text"></p>
            <h3 class="section-title">🛠️ Skills</h3>
            <ul class="skills-list" id="skills-list"></ul>
          </div>
          <div class="hero-chips">
            <span class="skill-chip"><img src="assets/icons/lua.svg" alt="Lua"></span>
            <span class="skill-chip"><img src="assets/icons/javascript.svg" alt="JS"></span>
          </div>
        </article>
      </section>

      <section id="experience" class="tab-panel">
        <article class="glass panel-head">
          <h3 class="section-title">Past Experiences</h3>
          <p class="total-visits-counter" id="total-visits">Calculating total reach...</p>
          <p class="experience-subtext">Below are some of the games I contributed to. Click to be redirected there!</p>
        </article>
        <ol id="experience-timeline" class="timeline"></ol>
      </section>

      <section id="contact" class="tab-panel">
        <article class="glass contact-card">
          <h3 class="section-title">Contact</h3>
          <ul id="contact-details"></ul>
          <div class="social-buttons" id="social-buttons"></div>
        </article>
      </section>
    </main>

    <script src="portfolio.config.js"></script>
    <script src="script.js"></script>
  </body>
</html>
